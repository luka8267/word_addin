<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f5f5f4;
        color: #1c1917;
        font-family: "Segoe UI", "Hiragino Sans", sans-serif;
      }
      main {
        max-width: 460px;
        padding: 24px;
        border-radius: 8px;
        background: #fffbeb;
        border: 1px solid #fcd34d;
        box-shadow: 0 12px 30px rgba(28, 25, 23, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.6;
      }
      p:last-child {
        margin-bottom: 0;
      }
      code {
        overflow-wrap: anywhere;
        font-family: Consolas, "SFMono-Regular", monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>指定された静的ファイルは見つかりませんでした。manifest や ribbon が参照する URL を確認してください。</p>
      <p><code id="requested-path"></code></p>
    </main>
    <script>
      document.getElementById("requested-path").textContent = window.location.href;
    </script>
  </body>
</html>
