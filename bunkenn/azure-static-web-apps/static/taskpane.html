<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bunken Word</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg-top: #f8f6f0;
        --bg-bottom: #efebe2;
        --card: rgba(255, 255, 255, 0.92);
        --text: #1f2933;
        --muted: #52606d;
        --primary: #0f766e;
        --secondary: #fff7ed;
        --secondary-text: #7c2d12;
        --line: #d9e2ec;
        --selected: #e0f2fe;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        padding: 20px;
        font-family: "Segoe UI", "Hiragino Sans", sans-serif;
        background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
      }
      .header { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
      .title { margin: 0; font-size: 24px; }
      .subtitle { margin: 6px 0 0; font-size: 13px; color: var(--muted); }
      .badge { padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; background: #fde68a; }
      .badge.ready { background: #d9f99d; }
      .card { margin-bottom: 14px; padding: 16px; border-radius: 18px; background: var(--card); box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); }
      .card.hidden { display: none; }
      h2 { margin: 0 0 10px; font-size: 17px; }
      input, select {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid #cbd2d9;
        font-size: 14px;
        background: #fffdf8;
        margin-bottom: 10px;
      }
      .message, .status { margin: 10px 0 12px; font-size: 12px; color: var(--muted); }
      .list { display: grid; gap: 10px; }
      .paper-item { text-align: left; width: 100%; border-radius: 14px; border: 1px solid var(--line); background: #fff; padding: 12px; cursor: pointer; }
      .paper-item.selected { border-color: #127fbf; background: var(--selected); }
      .paper-title { display: block; margin-bottom: 6px; font-size: 14px; color: #102a43; }
      .paper-meta { display: block; font-size: 12px; color: var(--muted); }
      .button { width: 100%; padding: 12px; border-radius: 999px; border: none; font-weight: 700; cursor: pointer; }
      .button.primary { background: var(--primary); color: #fff; }
      .button.secondary { border: 1px solid #1f2937; background: var(--secondary); color: var(--secondary-text); }
      .button.ghost { border: 1px solid #cbd2d9; background: #fff; color: var(--text); }
      .button:disabled, input:disabled, select:disabled { opacity: 0.55; cursor: not-allowed; }
      .inline-row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
      .inline-row.start { align-items: center; }
      .user-line { margin: 0; font-size: 12px; color: var(--muted); }
      .toggle-button {
        width: auto;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid #cbd2d9;
        background: #fff;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .collapsible.hidden { display: none; }
    </style>
  </head>
  <body>
    <main>
      <header class="header">
        <div>
          <h1 class="title">bunken Word</h1>
          <p class="subtitle">Word で引用と参考文献を挿入します。</p>
        </div>
        <span id="ready-badge" class="badge">Loading</span>
      </header>

      <section id="auth-card" class="card">
        <h2>ログイン</h2>
        <input id="email-input" type="email" placeholder="メールアドレス" />
        <input id="password-input" type="password" placeholder="パスワード" />
        <button id="login-button" class="button primary">bunkenn にログイン</button>
        <p id="auth-message" class="message">bunkenn のアカウントでログインすると、その人の文献だけが表示されます。</p>
      </section>

      <section id="app-card" class="card hidden">
        <div class="inline-row">
          <div>
            <h2>アカウント</h2>
            <p id="user-message" class="user-line"></p>
          </div>
          <button id="logout-button" class="button ghost" style="width:auto; padding:10px 14px;">ログアウト</button>
        </div>
      </section>

      <section id="search-card" class="card hidden">
        <div class="inline-row start">
          <div>
            <h2>文献検索</h2>
          </div>
          <button id="refresh-papers-button" class="toggle-button" type="button">更新</button>
        </div>
        <input id="search-input" placeholder="例: Suzuki 2024" />
        <p id="search-message" class="message">タイトル、著者、雑誌名で検索できます。</p>
        <div id="search-results" class="list"></div>
      </section>

      <section id="library-card" class="card hidden">
        <div class="inline-row start">
          <div>
            <h2>文献一覧</h2>
            <p id="library-message" class="message">通常は閉じたままにして、必要なときだけ開けます。</p>
          </div>
          <button id="library-toggle-button" class="toggle-button" type="button">一覧を開く</button>
        </div>
        <div id="library-panel" class="collapsible hidden">
          <div id="library-results" class="list"></div>
        </div>
      </section>

      <section id="citation-card" class="card hidden">
        <h2>引用挿入</h2>
        <p id="selection-message" class="message">文献を選ぶと本文に引用を挿入できます。</p>
        <select id="style-select">
          <option value="vancouver">Vancouver</option>
          <option value="apa">APA</option>
          <option value="acs">ACS</option>
          <option value="nature">Nature</option>
          <option value="ieee">IEEE</option>
        </select>
        <input id="locator-input" placeholder="例: p. 25" />
        <button id="insert-citation-button" class="button primary">本文に引用を挿入</button>
      </section>

      <section id="bibliography-card" class="card hidden">
        <h2>参考文献</h2>
        <p class="message">文書内の引用をもとに、末尾の参考文献ブロックを更新します。</p>
        <button id="refresh-bibliography-button" class="button secondary">参考文献を更新</button>
      </section>

      <footer id="status" class="status">Word と接続中です。</footer>
    </main>
    <script src="./taskpane.js?v=style-live1"></script>
  </body>
</html>
